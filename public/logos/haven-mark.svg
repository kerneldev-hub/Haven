<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#38bdf8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Hexagonal Sanctuary Base -->
  <polygon points="16,3 28,10 28,22 16,29 4,22 4,10" fill="#0b0f19" stroke="url(#glow-grad)" stroke-width="1.8" stroke-linejoin="round" />
  
  <!-- Infinite Loop Structure -->
  <path d="M11 16c0-2.2 1.8-4 4-4s4 4 4 4 1.8 4 4 4 4-1.8 4-4-1.8-4-4-4-4 4-4 4-1.8 4-4 4-4-1.8-4-4z" stroke="url(#glow-grad)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
  
  <!-- Central Luminous Core -->
  <circle cx="16" cy="16" r="4.5" fill="url(#core-glow)" />
  <circle cx="16" cy="16" r="1.5" fill="#ffffff" />
</svg>
