name: "HAVEN Automated Launch & Release Pipeline"

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag override (e.g. v2.2.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build frontend static files
        run: npm run build

      - name: Build and Publish Tauri Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || github.event.inputs.tag_name || 'v0.1.0' }}
          releaseName: 'Haven v${{ github.ref_name || github.event.inputs.tag_name || "0.1.0" }}'
          releaseBody: 'Automated cross-platform production release for Haven App. Built and signed via GitHub Action compilation workers.'
          releaseDraft: false
          prerelease: false

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build React frontend app
        run: npm run build

      - name: Setup Capacitor and add Android platform
        run: |
          npm install -g @capacitor/cli
          npx cap add android || true
          npx cap sync android

      - name: Create self-signed Keystore for Release Signing
        # Generates a debug-equivalent release token to allow signing without requiring GitHub Secrets at initial deploy.
        # Note: In a secure production environment, this should eventually be replaced with encrypted Secrets input.
        run: |
          keytool -genkeypair -v \
            -keystore android/release-key.jks \
            -alias release-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password123 \
            -keypass password123 \
            -dname "CN=Haven App, OU=Engineering, O=Haven, L=Algiers, S=Algiers, C=DZ"

      - name: Compile Unsigned Release APK
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Cryptographically Sign Android Package
        run: |
          APK_DIR="android/app/build/outputs/apk/release"
          if [ -f "$APK_DIR/app-release-unsigned.apk" ]; then
            echo "Signing unsigned build..."
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
              -keystore android/release-key.jks \
              -storepass password123 \
              -keypass password123 \
              "$APK_DIR/app-release-unsigned.apk" release-alias
            mv "$APK_DIR/app-release-unsigned.apk" "$APK_DIR/app-release.apk"
          elif [ -f "$APK_DIR/app-release.apk" ]; then
            echo "Signing raw release build..."
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
              -keystore android/release-key.jks \
              -storepass password123 \
              -keypass password123 \
              "$APK_DIR/app-release.apk" release-alias
          else
            echo "No output binary located. Checking directory structure:"
            find android/ -name "*.apk"
            exit 1
          fi

      - name: Upload Signed APK to existing Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          tag_name: ${{ github.ref_name || github.event.inputs.tag_name || 'v0.1.0' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Generate Unified SHA256 Verification Manifest & Checksums
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const fs = require('fs');
            const https = require('https');
            
            const ref = context.ref;
            let tag = '';
            if (ref.startsWith('refs/tags/')) {
              tag = ref.replace('refs/tags/', '');
            } else {
              tag = '${{ github.event.inputs.tag_name }}' || 'v0.1.0';
            }
            
            console.log(`Analyzing builds for Release version tag: ${tag}`);
            
            let release;
            try {
              const res = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag
              });
              release = res.data;
            } catch (err) {
              console.log(`Tag ${tag} is not fully published yet or needs search fallback.`);
              try {
                const res = await github.rest.repos.getLatestRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
                release = res.data;
              } catch (e) {
                console.error("Critical: Could not locate active GitHub Release for checksum hashing.", e);
                return;
              }
            }
            
            console.log(`Release ID resolved: ${release.id}`);
            const assets = release.assets;
            let sumContent = '';
            
            // Helper function to download file over https buffer
            const downloadFile = (url) => {
              return new Promise((resolve, reject) => {
                https.get(url, { headers: { 'User-Agent': 'node.js' } }, (res) => {
                  if (res.statusCode === 302 || res.statusCode === 301) {
                    // Follow redirect to S3 target
                    downloadFile(res.headers.location).then(resolve).catch(reject);
                    return;
                  }
                  if (res.statusCode !== 200) {
                    reject(new Error(`Failed to download binary: Status ${res.statusCode}`));
                    return;
                  }
                  const data = [];
                  res.on('data', chunk => data.push(chunk));
                  res.on('end', () => resolve(Buffer.concat(data)));
                }).on('error', reject);
              });
            };
            
            for (const asset of assets) {
              if (asset.name === 'SHA256SUMS.txt') {
                continue;
              }
              console.log(`Processing asset: ${asset.name} (ID: ${asset.id})`);
              try {
                const buffer = await downloadFile(asset.browser_download_url);
                const hash = crypto.createHash('sha256').update(buffer).digest('hex');
                sumContent += `${hash}  ${asset.name}\n`;
                console.log(`Hashed: ${hash}  ${asset.name}`);
              } catch (err) {
                console.error(`Could not download or hash ${asset.name}:`, err);
              }
            }
            
            if (sumContent) {
              fs.writeFileSync('SHA256SUMS.txt', sumContent);
              console.log('Writing file locally. Preparing upload...');
              
              const existingSums = assets.find(a => a.name === 'SHA256SUMS.txt');
              if (existingSums) {
                console.log(`Purging old checksum manifest asset ID: ${existingSums.id}`);
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existingSums.id
                });
              }
              
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: 'SHA256SUMS.txt',
                data: fs.readFileSync('SHA256SUMS.txt'),
                headers: {
                  'content-length': fs.statSync('SHA256SUMS.txt').size,
                  'content-type': 'text/plain'
                }
              });
              console.log('Integrity index SHA256SUMS.txt published.');
            } else {
              console.log('No assets to build checksum list file.');
            }
